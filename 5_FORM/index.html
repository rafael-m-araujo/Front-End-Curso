<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <h2>Formulários HTML</h2>  
  <!-- 1 - Primeiro Formulário -->
  <!-- 2 Atributos do formulário -->
  <form action="register.php" method="GET">
 <div>
    <label>Nome:</label>
    <input type="text">
 </div>
 <!-- 3 - Atributo Name -->
  <div>
 <!-- 4 - Atributo Label -->
    <label for="age">Idade:</label>
    <input type= "text" name="age">
  </div>

  <!-- 6 - Select -->
   <div>
    <label for="job">Selecione a sua profissão:</label>
    <select name="job">
      <option value="programador">Programador</option>
      <option value="tester">Tester/QA</option>
      <option value="devops">DevOps</option>
    </select>
   </div> 
    <!-- 7 - Atributo Selected -->
    <div>
      <label for="contract">Você leu os termos do contrato?</label>
      <select name="contract">
        <option value="sim">Sim</option>
        <option value="nao" selected>Não</option>
      </select>
    </div>
    <!-- 8 - Multiplas Opções -->
    <div>
      <label for="itens">Selecionar os itens desejados:</label>
      <select name="Itens" multiple> 
      <option value="pera">Pera</option>    
      <option value="arroz">Arroz</option>    
      <option value="feijao">Feijão</option>    
      <option value="milho">Milho</option>    
      </select>
    </div>
    <!-- 9 - Textarea -->
     <div>
     <label for="comment">Escreva abaixo o que você achou do post:</label>
     <textarea name="comment"></textarea>
     </div>
    <!-- 10 - Fieldet e Legend --> 
     <div>
      <fieldset>
       <legend>Preencha as suas informações:</legend>
       <label for="firstname">Nome:</label>
       <input type="text" name="firstname">
       <label for="lastname">Sobrenome:</label>
       <input type="text" name="lastname">
      </fieldset>
     </div>
     <!-- 11 - Datalist -->
      <div>
      <label for="flavor">Escolhar o sabor:</label>
      <input type="text" list="flavors" name="flavor">

      <datalist id="flavors">
        <option value="Chocolate"></option>
        <option value="Baunilha"></option>
        <option value="Morango"></option>
        <option value="Coco"></option>
      </datalist>

      <!-- 12 - Senha -->
       <div>
         <label for="password">Digite sua senha:</label>
         <input type="password" name="password">
       </div>
      </div>

      <!-- 14 - Radio Button -->
      <div>
        <label for="car_model">Escolha o modelo do seu carro:</label>
        <div class="radio">
         <input type="radio" value="bmw" name="car_model">
         <label for="bmw">BMW</label>
        </div> 

          <div class="radio">
         <input type="radio" value="ferrari" name="car_model">
         <label for="ferrari">Ferrari</label>
        </div> 

          <div class="radio">
         <input type="radio" value="renault" name="car_model">
         <label for="renault">Renault</label>
        </div> 
      </div>

      <!-- 15 - Checkbox -->
       <div>
        <label for="optionals">Opcionais do carro</label>
        <div class="radio">
          <input type="checkbox" name="optionals[]" value="big_tires">
          <label for="big_tires">Pneus Grandes</label>
        </div>

        <div class="radio">
          <input type="checkbox" name="optionals[]" value="turbo-engine">
          <label for="turbo-engine">Motor Turbo</label>
        </div>

        <div class="radio">
          <input type="checkbox" name="optionals[]" value="hybrid">
          <label for="hybrid">Híbrido</label>
        </div>

       </div>

        <!-- 16 - Datas -->
        <div>
          <label for="birthday">Data de nascimento</label>
          <input type="date" name="birthday">
        </div>

        <!-- 17 - Arquivos -->
         <div>
          <label for="image">Insira a sua imagem:</label>
          <input type="file"name="image">
         </div>

        <!-- 18 - Numeros -->
          <div>
            <label for="salary">Quanto você ganha no seu emprego atual?</label>
            <input type="number" name="salary">
          </div>

        <!-- 19 - Email -->
           <label for="email">Digite o seu email:</label>
           <input type="email" name="email">

        <!-- 20 - Value -->
            <div>
            <label for="value">Digite algum valor:</label>
            <input type="text" value="O meu valor é este">
            </div>

        <!-- 21 - Disabled -->
         <div>
          <p>Tente mudar o valor:</p>
          <input type="text" value="Não precisa preencher" disabled>
         </div>   

         <!-- 22 - Placeholder -->
          <div>
            <label for="currentjob">Digite a sua profissão:</label>
            <input type="text" name="currentjob" placeholder="No que você esta trabalhando agora?">
          </div>  

        <!-- 23 - Required -->
         <div>
          <label for="birthyear">Ano de Nascimento:</label>
          <input type="text" placeholder="Digite o ano em que você nasceu" required>
         </div>  

      <!-- 13 - Resetar Form -->
      <input type="reset" value="Limpar">

     <!-- 5 - Envio de Form -->
     <input type="submit" value="Enviar" />
  </form>
</body>
</html>
